name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/java-ne-backend

jobs:
  publish-image:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger GitOps manifest update
        env:
          MANIFEST_REPO: ${{ vars.MANIFEST_REPO }}
          MANIFEST_REPO_PAT: ${{ secrets.MANIFEST_REPO_PAT }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          TAG: ${{ steps.meta.outputs.version }}
        run: |
          if [ -z "$MANIFEST_REPO" ] || [ -z "$MANIFEST_REPO_PAT" ]; then
            echo "Manifest repo not configured. Skipping."
            exit 0
          fi

          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $MANIFEST_REPO_PAT" \
            https://api.github.com/repos/$MANIFEST_REPO/dispatches \
            -d "{\"event_type\":\"image-published\",\"client_payload\":{\"image\":\"$IMAGE\",\"tag\":\"$TAG\"}}"