spring.application.name=java-ne-backend
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

server.port=${SERVER_PORT:8080}
server.host=${SERVER_HOST:localhost:8080}

swagger.base_controller_path=${SWAGGER_BASE_CONTROLLER_PATH:com.ne.java.controllers}

jwt.secret=${JWT_SECRET:change-this-in-production}
jwt.expiresIn=${JWT_EXPIRES_IN:86400000}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/java2023}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.open-in-view=${SPRING_JPA_OPEN_IN_VIEW:false}

management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.endpoints.web.exposure.include=health

